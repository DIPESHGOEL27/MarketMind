services:
  backend:
    build:
      context: ./marketmind-backend
      dockerfile: Dockerfile
    container_name: marketmind-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./marketmind-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
        - NEXT_PUBLIC_WS_URL=ws://localhost:8080/ws
    container_name: marketmind-web
    ports:
      - "3000:3000"
    environment:
      - API_BACKEND_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
